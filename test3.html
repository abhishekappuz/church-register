<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSI Marayamuttom — Contribution Register</title>
<style>

  :root{
    --paper:#FBF8F2;
    --paper-dim:#F2EDE2;
    --ink:#2B2420;
    --ink-soft:#6B6055;
    --gold:#A8762E;
    --gold-soft:#D9B984;
    --sage:#6B8068;
    --sage-bg:#E9EFE6;
    --red:#A8453F;
    --red-bg:#F6E8E6;
    --line:#DDD3BF;
    --line-strong:#C7B896;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.serif{font-family:'Source Serif 4',serif;}

  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input{font-family:inherit;}

  button:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  /* ================= SHARED MASTHEAD ================= */
  .masthead{text-align:center;}
  .masthead .church-name{
    font-size:26px;
    font-weight:700;
    margin:0;
    line-height:1.2;
    letter-spacing:0.01em;
  }
  .masthead .reg-sub{
    font-size:12px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.14em;
    margin:6px 0 0;
    font-weight:600;
  }
  .masthead-rule{
    width:48px;
    height:2px;
    background:var(--gold);
    margin:18px auto 0;
  }

  /* ================= LOGIN PAGE ================= */
  #loginScreen{
    display:none;
    min-height:100vh;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(168,118,46,0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(168,118,46,0.05), transparent 40%),
      var(--paper-dim);
  }
  .cover{
    width:100%;
    max-width:420px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:0 1px 2px rgba(43,36,32,0.04), 0 16px 40px rgba(43,36,32,0.1);
    position:relative;
    padding:44px 40px 40px;
  }
  .cover::before{
    content:"";
    position:absolute;
    left:14px; top:14px; right:14px; bottom:14px;
    border:1px solid var(--gold-soft);
    pointer-events:none;
  }
  .cover .masthead{margin-bottom:30px;}
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    color:var(--ink-soft);
    font-weight:600;
    margin-bottom:20px;
  }
  .back-link:hover{color:var(--ink);}

  .field{margin-bottom:18px;}
  .field label{
    display:block;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-weight:600;
  }
  .field input{
    width:100%;
    padding:12px 13px;
    border:1px solid var(--line-strong);
    background:var(--paper);
    color:var(--ink);
    font-size:15px;
    border-radius:5px;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(168,118,46,0.1);}

  .btn-primary{
    width:100%;
    padding:14px;
    background:var(--ink);
    color:var(--paper);
    font-size:14px;
    font-weight:600;
    letter-spacing:0.02em;
    border-radius:5px;
    margin-top:6px;
    transition:background .15s, transform .1s;
  }
  .btn-primary:hover{background:#3d342c;}
  .btn-primary:active{transform:scale(0.98);}

  .btn-ghost{
    width:100%;
    padding:14px;
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line-strong);
    font-size:14px;
    font-weight:600;
    border-radius:5px;
    margin-top:6px;
    transition:background .15s;
  }
  .btn-ghost:hover{background:var(--paper-dim);}

  .login-error{
    background:var(--red-bg);
    color:var(--red);
    font-size:13px;
    padding:11px 14px;
    border-radius:5px;
    margin-bottom:16px;
    display:none;
  }

  /* ================= APP SHELL ================= */
  #app{display:none; min-height:100vh; flex-direction:column;}
  .topbar{
    background:var(--ink);
    color:var(--paper);
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
  }
  .topbar-left{display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .topbar-titles{line-height:1.3;}
  .topbar-titles .tb-church{font-size:17px; font-weight:700; margin:0; letter-spacing:0.01em;}
  .topbar-titles .tb-sub{font-size:10.5px; color:var(--gold-soft); text-transform:uppercase; letter-spacing:0.12em; margin:0; font-weight:600;}
  .role-pill{
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:4px 11px;
    border-radius:20px;
    font-weight:700;
    font-family:'Inter',sans-serif;
  }
  .role-pill.admin{background:var(--gold-soft); color:#4a3415;}
  .role-pill.viewer{background:#3d4a3a; color:#cfe0c9;}

  .topbar-right{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .btn-small{
    padding:9px 16px;
    font-size:12.5px;
    font-weight:600;
    border-radius:5px;
    background:rgba(251,248,242,0.08);
    color:var(--paper);
    border:1px solid rgba(251,248,242,0.2);
    white-space:nowrap;
    transition:background .15s, border-color .15s, transform .1s;
  }
  .btn-small:hover{background:rgba(251,248,242,0.16); border-color:rgba(251,248,242,0.32);}
  .btn-small:active{transform:scale(0.97);}
  .btn-small.danger{background:rgba(168,69,63,0.85); border-color:var(--red);}
  .btn-small.danger:hover{background:var(--red);}
  .btn-small.gold{background:var(--gold); border-color:var(--gold); color:#fff;}
  .btn-small.gold:hover{background:#946326;}

  .toolbar{
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:16px 28px;
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1;
    min-width:220px;
    max-width:380px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:10px 14px 10px 36px;
    border:1px solid var(--line-strong);
    border-radius:22px;
    font-size:13.5px;
    background:var(--paper-dim);
    transition:background .15s, box-shadow .15s;
  }
  .search-box input:focus{background:var(--paper); box-shadow:0 0 0 3px rgba(168,118,46,0.1);}
  .search-icon{
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; color:var(--ink-soft);
  }
  .record-count{
    font-size:12.5px;
    color:var(--ink-soft);
    white-space:nowrap;
    font-weight:500;
  }
  .toolbar-spacer{flex:1;}

  /* ================= TABLE ================= */
  .table-wrap{
    flex:1;
    overflow:auto;
    background:var(--paper);
    margin:0 28px 28px;
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:0 1px 3px rgba(43,36,32,0.06), 0 8px 24px rgba(43,36,32,0.04);
  }
  table{
    border-collapse:collapse;
    width:100%;
    min-width:1400px;
    font-size:14px;
  }
  thead th{
    position:sticky;
    top:0;
    background:var(--ink);
    color:var(--paper);
    font-weight:600;
    text-align:left;
    padding:13px 14px;
    font-size:12px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    z-index:2;
    border-right:1px solid rgba(251,248,242,0.1);
    white-space:nowrap;
  }
  thead th.fund-col{text-align:right; color:var(--gold-soft);}
  thead th.sl-col{
    left:0; z-index:3;
    text-align:center;
    width:54px;
    color:var(--paper);
  }
  thead th.name-col{left:54px; z-index:3; min-width:120px; color:var(--paper);}
  thead th.addr-col{min-width:210px; color:var(--paper);}

  .manage-cols-th{
    text-align:center !important;
    width:64px;
    color:var(--paper) !important;
  }
  .manage-cols-btn{
    width:30px; height:30px;
    border-radius:6px;
    color:var(--paper);
    background:rgba(251,248,242,0.12);
    display:inline-flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .manage-cols-btn:hover{background:var(--gold);}

  tbody td{
    padding:11px 14px;
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    white-space:nowrap;
  }
  tbody tr:nth-child(even){background:#FAF6ED;}
  tbody tr:hover{background:var(--sage-bg);}

  td.sl-col, td.name-col{
    position:sticky;
    background:inherit;
    z-index:1;
  }
  td.sl-col{left:0; text-align:center; color:var(--ink-soft); font-weight:600;}
  td.name-col{left:54px; font-weight:600;}
  tbody tr:hover td.sl-col, tbody tr:hover td.name-col{background:var(--sage-bg);}

  td.fund-col{text-align:right; font-variant-numeric:tabular-nums; color:var(--ink);}
  td.addr-col{white-space:normal; max-width:220px; color:var(--ink-soft);}

  .total-row td{
    background:#EFE6D2 !important;
    font-weight:700;
    border-top:2px solid var(--gold);
    position:sticky;
    bottom:0;
  }
  .total-row td.fund-col{color:#8a5d23;}

  td input{
    width:84px;
    padding:7px 8px;
    border:1px solid transparent;
    background:transparent;
    text-align:right;
    font-size:14px;
    border-radius:3px;
    font-variant-numeric:tabular-nums;
  }
  td input:hover{border-color:var(--line-strong);}
  td input:focus{
    border-color:var(--gold);
    background:var(--paper);
    box-shadow:0 0 0 3px rgba(168,118,46,0.12);
  }
  td.name-col input, td.addr-col input{
    width:100%;
    text-align:left;
    min-width:100px;
  }

  .row-actions{display:flex; gap:6px; justify-content:center;}
  .icon-btn{
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    border-radius:5px;
    color:var(--ink-soft);
    transition:background .15s, color .15s;
  }
  .icon-btn:hover{background:var(--paper-dim); color:var(--ink);}
  .icon-btn.delete:hover{color:var(--red); background:var(--red-bg);}

  .empty-state{text-align:center; padding:72px 24px; color:var(--ink-soft);}
  .empty-state h3{margin:0 0 8px; color:var(--ink); font-size:19px;}
  .empty-state svg{color:var(--gold-soft); margin-bottom:12px;}

  /* ================= MODAL ================= */
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(43,36,32,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .modal{
    background:var(--paper);
    width:100%;
    max-width:380px;
    border-radius:8px;
    padding:30px;
    box-shadow:0 24px 60px rgba(0,0,0,0.28);
    border:1px solid var(--line);
  }
  .modal h3{margin:0 0 8px; font-size:19px; font-family:'Source Serif 4',serif;}
  .modal p{font-size:13.5px; color:var(--ink-soft); margin:0 0 20px; line-height:1.55;}
  .modal-actions{display:flex; gap:10px;}
  .modal-actions button{flex:1; padding:12px; border-radius:5px; font-size:13.5px; font-weight:600;}

  .modal-add{max-width:480px;}
  .modal-add .field input{padding:10px 11px;}
  .add-grid{display:grid; grid-template-columns:1fr 1fr; gap:0 14px;}

  /* ================= MANAGE COLUMNS MODAL ================= */
  .modal-cols{max-width:520px;}
  .col-list{
    max-height:360px;
    overflow-y:auto;
    margin:0 -4px 18px;
    padding:0 4px;
  }
  .col-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .col-row:last-child{border-bottom:none;}
  .col-row-num{
    width:22px;
    flex-shrink:0;
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
    font-weight:600;
  }
  .col-row input{
    flex:1;
    padding:9px 11px;
    border:1px solid var(--line-strong);
    border-radius:3px;
    font-size:14px;
    background:var(--paper);
    color:var(--ink);
  }
  .col-row input:focus{border-color:var(--gold);}
  .col-row-delete{
    flex-shrink:0;
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    border-radius:4px;
    color:var(--ink-soft);
    border:1px solid var(--line-strong);
  }
  .col-row-delete:hover{color:var(--red); background:var(--red-bg); border-color:var(--red);}
  .add-col-row-btn{
    width:100%;
    padding:11px;
    margin-top:6px;
    border:1.5px dashed var(--line-strong);
    border-radius:4px;
    color:var(--gold);
    font-size:13.5px;
    font-weight:600;
    background:transparent;
  }
  .add-col-row-btn:hover{background:var(--paper-dim); border-color:var(--gold);}

  /* Toast */
  #toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--paper);
    padding:12px 20px;
    border-radius:4px;
    font-size:13.5px;
    font-weight:500;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s, transform .2s;
    z-index:100;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  #toast.success{background:var(--sage);}
  #toast.error{background:var(--red);}

  /* ================= SYNC STATUS / LOADING ================= */
  .sync-pill{
    font-size:10.5px;
    color:var(--ink-soft);
    display:inline-flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .sync-dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--sage);
    flex-shrink:0;
  }
  .sync-dot.saving{background:var(--gold); animation:pulse 1s infinite;}
  .sync-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.4;}}

  .loading-screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    color:var(--ink-soft);
    font-size:13.5px;
  }
  .loading-spinner{
    width:28px; height:28px;
    border:3px solid var(--line);
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .config-error{
    max-width:480px;
    margin:60px auto;
    background:var(--red-bg);
    border:1px solid var(--red);
    border-radius:4px;
    padding:24px 28px;
    color:var(--ink);
  }
  .config-error h3{margin:0 0 10px; color:var(--red);}
  .config-error code{background:rgba(0,0,0,0.06); padding:2px 6px; border-radius:3px; font-size:12.5px;}

  /* ================= PRINT VIEW ================= */
  #printArea{display:none;}
  @media print{
    #loginScreen, #app, #toast, .modal-backdrop{display:none !important;}
    #printArea{display:block !important;}
    body{background:#fff;}
    .print-masthead{text-align:center; margin-bottom:18px;}
    .print-masthead h1{font-size:22px; margin:0; font-family:'Source Serif 4',serif;}
    .print-masthead .p-sub{font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#444; margin:4px 0 0;}
    .print-masthead .p-date{font-size:10.5px; color:#666; margin-top:8px;}
    table.print-table{width:100%; border-collapse:collapse; font-size:10.5px;}
    table.print-table th, table.print-table td{border:1px solid #999; padding:4px 6px;}
    table.print-table th{background:#eee; text-align:left;}
    table.print-table td.p-fund, table.print-table th.p-fund{text-align:right;}
    table.print-table tr.p-total td{font-weight:700; border-top:2px solid #000;}
  }

  @media (max-width:640px){
    .cover{padding:36px 24px 28px;}
    .topbar{padding:14px 16px;}
    .toolbar{padding:12px 16px;}
    .table-wrap{margin:0 0 16px;}
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js" defer onerror="window.__supabaseLoadFailed=true; document.getElementById('t3').textContent='unpkg FAILED, trying jsdelivr...'; var s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'; s.onload=function(){document.getElementById('t3').textContent='jsdelivr fallback LOADED';}; s.onerror=function(){document.getElementById('t3').textContent='jsdelivr FAILED too, trying cdnjs...';var s2=document.createElement('script');s2.src='https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.39.7/supabase.min.js';s2.onload=function(){document.getElementById('t3').textContent='cdnjs fallback LOADED';};s2.onerror=function(){document.getElementById('t3').textContent='ALL THREE CDNs FAILED';};document.head.appendChild(s2);}; document.head.appendChild(s);"></script>
</head>
<body>
<h1 style="text-align:center; margin-top:60px;">Supabase library load test</h1>
<p style="text-align:center; font-size:20px; font-weight:bold;" id="t3">Checking...</p>
<p style="text-align:center;" id="t3b"></p>
<script>
document.getElementById('t3b').textContent = 'Page script ran at: ' + new Date();
function checkLib(tries){
  if(window.supabase){
    document.getElementById('t3').textContent = 'SUCCESS: window.supabase exists after ' + tries + ' checks';
  } else if(tries > 50){
    document.getElementById('t3').textContent = 'TIMEOUT: window.supabase never appeared after 15s (unless a CDN onload already updated this)';
  } else {
    setTimeout(()=>checkLib(tries+1), 300);
  }
}
checkLib(0);
</script>
</body>
</html>
